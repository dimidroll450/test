<mat-card class="book-card">
  <mat-card-header>
    <mat-card-title [innerHTML]= "bookTitle | highlight:searchValue"></mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p> {{ bookDescription }}</p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton>Read more</button>
  </mat-card-actions>
</mat-card>
